<!DOCTYPE html>
<html lang="hi">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

    <div id="ganesh-intro">
        <div class="ganesh-glow"></div>

            <img src="https://i.ibb.co/3p1zG4D/ganesh-ultra-clean.png" alt="Ganesh ji" class="clean-ganesh-img">

        <div class="ganesh-text">

    </div>

    <div id="main-site">
        <nav class="navbar">
            <a href="#" class="nav-logo">

                <div class="nav-brand-text">
                    <span class="brand-main">SERVIXA</span>
                    <span class="brand-sub">HOME SERVICES</span>
                </div>

            <div class="nav-contact-top">
                <a href="tel:+918779694303" class="call-btn">📞 8779694303</a>

                        <a href="https://wa.me/918779694303" class="btn-primary">Book on WhatsApp</a>
                        <a href="mailto:home.servixa@gmail.com" class="btn-secondary">Email Us</a>
                    </div>
                </div>

                <div class="hero-visual">
                    <div class="main-logo-display">
                        <img src="1000228651.png" alt="Servixa Logo Large">
