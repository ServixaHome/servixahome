 <!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servixa Home – सेवा • सुरक्षा • समृद्धि</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Tiro+Devanagari+Sanskrit&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8962A;
    --gold-light: #F0C040;
    --navy: #0D2B6B;
    --navy-dark: #071A45;
    --navy-light: #1A3A8A;
    --white: #FFFFFF;
    --off-white: #F8F6F0;
    --text-dark: #1a1a2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--navy-dark);
    color: var(--white);
    overflow-x: hidden;
  }

  /* ============ GANESH INTRO SCREEN ============ */
  #ganesh-intro {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: radial-gradient(ellipse at center, #1a0a00 0%, #000 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: introFadeOut 1s ease 4.5s forwards;
  }

  @keyframes introFadeOut {
    to { opacity: 0; pointer-events: none; visibility: hidden; }
  }

  .ganesh-glow {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,150,42,0.4) 0%, transparent 70%);
    animation: ganeshPulse 2s ease-in-out infinite;
  }

  @keyframes ganeshPulse {
    0%,100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  .ganesh-img-wrap {
    position: relative;
    z-index: 2;
    animation: ganeshReveal 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0;
    transform: scale(0.5) translateY(40px);
  }

  @keyframes ganeshReveal {
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .ganesh-img-wrap img {
    width: 220px;
    height: 220px;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(200,150,42,0.8)) drop-shadow(0 0 60px rgba(200,150,42,0.4));
    border-radius: 50%;
  }

  /* Fallback Ganesh SVG */
  .ganesh-svg {
    width: 200px; height: 200px;
    filter: drop-shadow(0 0 30px rgba(200,150,42,0.9));
  }

  .ganesh-text {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-top: 24px;
    animation: ganeshReveal 1s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0;
  }

  .om-text {
    font-family: 'Tiro Devanagari Sanskrit', serif;
    font-size: 3rem;
    color: var(--gold-light);
    text-shadow: 0 0 20px rgba(240,192,64,0.8);
    letter-spacing: 4px;
  }

  .ganesh-subtitle {
    font-family: 'Tiro Devanagari Sanskrit', serif;
    font-size: 1.1rem;
    color: rgba(240,192,64,0.8);
    margin-top: 8px;
    letter-spacing: 2px;
  }

  .particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold-light);
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-20px) scale(1); opacity: 0; }
  }

  /* ============ MAIN WEBSITE ============ */
  #main-site {
    opacity: 0;
    animation: siteReveal 1s ease 5s forwards;
  }

  @keyframes siteReveal {
    to { opacity: 1; }
  }

  /* ============ NAVBAR ============ */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 0 5%;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(7,26,69,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(200,150,42,0.3);
    transition: all 0.3s;
  }

  .navbar.scrolled {
    height: 64px;
    background: rgba(7,26,69,0.98);
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .nav-logo img {
    height: 52px;
    width: 52px;
    object-fit: contain;
    border-radius: 50%;
    border: 2px solid var(--gold);
    box-shadow: 0 0 15px rgba(200,150,42,0.4);
    transition: all 0.3s;
  }

  .nav-logo:hover img {
    box-shadow: 0 0 25px rgba(200,150,42,0.7);
    transform: rotate(5deg);
  }

  .nav-brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .nav-brand-text .brand-main {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 2px;
  }

  .nav-brand-text .brand-sub {
    font-size: 0.65rem;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .nav-links {
    display: flex;
    list-style: none;
    gap: 32px;
    align-items: center;
  }

  .nav-links a {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    position: relative;
    transition: color 0.3s;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 2px;
    background: var(--gold);
    transition: width 0.3s ease;
  }

  .nav-links a:hover { color: var(--gold-light); }
  .nav-links a:hover::after { width: 100%; }

  .nav-cta {
    background: linear-gradient(135deg, var(--gold), #A07018);
    color: var(--navy-dark) !important;
    padding: 10px 24px;
    border-radius: 4px;
    font-weight: 700 !important;
    transition: all 0.3s !important;
  }

  .nav-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(200,150,42,0.4);
  }

  .nav-cta::after { display: none !important; }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
  }

  .hamburger span {
    display: block;
    width: 26px; height: 2px;
    background: var(--gold);
    transition: all 0.3s;
    border-radius: 2px;
  }

  /* ============ HERO SECTION ============ */
  .hero {
    min-height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
    background: linear-gradient(135deg, #071A45 0%, #0D2B6B 50%, #071A45 100%);
  }

  .hero-bg-pattern {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(200,150,42,0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 20%, rgba(200,150,42,0.06) 0%, transparent 40%),
      radial-gradient(circle at 60% 80%, rgba(26,58,138,0.5) 0%, transparent 50%);
    pointer-events: none;
  }

  .hero-grid {
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(200,150,42,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(200,150,42,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    padding: 120px 5% 80px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  .hero-text .shlok-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(200,150,42,0.15);
    border: 1px solid rgba(200,150,42,0.4);
    padding: 8px 20px;
    border-radius: 30px;
    margin-bottom: 24px;
    font-family: 'Tiro Devanagari Sanskrit', serif;
    font-size: 0.85rem;
    color: var(--gold-light);
    letter-spacing: 1px;
    animation: fadeInUp 0.8s 5.2s both;
  }

  .hero-text h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2.2rem, 4vw, 3.5rem);
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 20px;
    animation: fadeInUp 0.8s 5.4s both;
  }

  .hero-text h1 .text-gold { color: var(--gold-light); }

  .hero-shlok {
    font-family: 'Tiro Devanagari Sanskrit', serif;
    font-size: 1.1rem;
    line-height: 1.8;
    color: rgba(240,192,64,0.9);
    border-left: 3px solid var(--gold);
    padding-left: 16px;
    margin: 24px 0;
    animation: fadeInUp 0.8s 5.6s both;
  }

  .shlok-meaning {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.6);
    font-style: italic;
    margin-top: 6px;
  }

  .hero-desc {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.75);
    line-height: 1.8;
    margin-bottom: 36px;
    animation: fadeInUp 0.8s 5.8s both;
  }

  .hero-btns {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    animation: fadeInUp 0.8s 6s both;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--gold), #A07018);
    color: var(--navy-dark);
    padding: 16px 36px;
    border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(200,150,42,0.3);
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
  }

  .btn-primary:hover::before { left: 100%; }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(200,150,42,0.5); }

  .btn-secondary {
    background: transparent;
    color: var(--white);
    padding: 16px 36px;
    border-radius: 4px;
    border: 2px solid rgba(255,255,255,0.3);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.3s;
  }

  .btn-secondary:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    transform: translateY(-3px);
  }

  .hero-visual {
    display: flex;
    justify-content: center;
    align-items: center;
    animation: fadeInRight 1s 5.5s both;
    position: relative;
  }

  .hero-logo-ring {
    position: relative;
    width: 380px; height: 380px;
  }

  .ring-outer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid rgba(200,150,42,0.3);
    animation: spin 20s linear infinite;
  }

  .ring-outer::before, .ring-outer::after {
    content: '◆';
    position: absolute;
    color: var(--gold);
    font-size: 10px;
  }

  .ring-outer::before { top: -6px; left: 50%; transform: translateX(-50%); }
  .ring-outer::after { bottom: -6px; left: 50%; transform: translateX(-50%); }

  @keyframes spin { to { transform: rotate(360deg); } }

  .ring-inner {
    position: absolute;
    inset: 20px;
    border-radius: 50%;
    border: 1px dashed rgba(200,150,42,0.2);
    animation: spin 15s linear infinite reverse;
  }

  .hero-logo-center {
    position: absolute;
    inset: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-logo-center img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(200,150,42,0.4));
    animation: logoFloat 4s ease-in-out infinite;
  }

  @keyframes logoFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .hero-stats {
    position: absolute;
    bottom: 60px;
    left: 5%;
    right: 5%;
    display: flex;
    gap: 40px;
    justify-content: center;
    animation: fadeInUp 0.8s 6.2s both;
  }

  .stat-item {
    text-align: center;
    padding: 16px 30px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(200,150,42,0.2);
    border-radius: 8px;
    backdrop-filter: blur(10px);
  }

  .stat-number {
    font-family: 'Cinzel Decorative', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold-light);
  }

  .stat-label {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ============ SECTION STYLES ============ */
  section { padding: 100px 5%; }

  .section-label {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-label span {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .section-label::before, .section-label::after {
    content: '';
    flex: 1;
    max-width: 50px;
    height: 1px;
    background: var(--gold);
    opacity: 0.5;
  }

  .section-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.8rem, 3vw, 2.8rem);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 20px;
  }

  .section-subtitle {
    font-family: 'Tiro Devanagari Sanskrit', serif;
    font-size: 1rem;
    color: var(--gold);
    margin-bottom: 8px;
  }

  /* ============ SERVICES SECTION ============ */
  .services {
    background: var(--navy-dark);
    position: relative;
    overflow: hidden;
  }

  .services::before {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,150,42,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .services-header {
    text-align: center;
    max-width: 700px;
    margin: 0 auto 60px;
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .service-card {
    background: linear-gradient(145deg, rgba(13,43,107,0.8), rgba(7,26,69,0.9));
    border: 1px solid rgba(200,150,42,0.15);
    border-radius: 12px;
    padding: 36px 28px;
    transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 3px;
    background: linear-gradient(90deg, var(--gold), transparent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }

  .service-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200,150,42,0.06), transparent);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .service-card:hover {
    transform: translateY(-8px);
    border-color: rgba(200,150,42,0.4);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 30px rgba(200,150,42,0.1);
  }

  .service-card:hover::before { transform: scaleX(1); }
  .service-card:hover::after { opacity: 1; }

  .service-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, rgba(200,150,42,0.2), rgba(200,150,42,0.05));
    border: 1px solid rgba(200,150,42,0.3);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    margin-bottom: 20px;
    transition: all 0.3s;
  }

  .service-card:hover .service-icon {
    background: linear-gradient(135deg, rgba(200,150,42,0.35), rgba(200,150,42,0.1));
    transform: scale(1.1) rotate(5deg);
  }

  .service-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  .service-desc {
    font-size: 0.92rem;
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
    margin-bottom: 16px;
  }

  .service-link {
    color: var(--gold);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    transition: gap 0.3s;
  }

  .service-link:hover { gap: 12px; }

  /* ============ SHLOK BANNER ============ */
  .shlok-banner {
    background: linear-gradient(135deg, var(--gold) 0%, #A07018 50%, var(--gold) 100%);
    background-size: 200% auto;
    animation: gradientShift 4s linear infinite;
    padding: 60px 5%;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  @keyframes gradientShift {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .shlok-banner::before {
    content: 'ॐ';
    position: absolute;
    font-family: 'Tiro Devanagari Sanskrit', serif;
    font-size: 20rem;
    color: rgba(7,26,69,0.06);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .banner-shlok {
    font-family: 'Tiro Devanagari Sanskrit', serif;
    font-size: clamp(1.1rem, 2.5vw, 1.8rem);
    color: var(--navy-dark);
    line-height: 1.8;
    font-weight: 700;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .banner-meaning {
    font-size: 0.95rem;
    color: rgba(7,26,69,0.75);
    font-style: italic;
    position: relative;
    z-index: 1;
  }

  /* ============ WHY US ============ */
  .why-us {
    background: linear-gradient(180deg, var(--navy-dark) 0%, var(--navy) 100%);
    position: relative;
  }

  .why-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    max-width: 1300px;
    margin: 0 auto;
  }

  .why-features {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .feature-item {
    display: flex;
    gap: 20px;
    padding: 24px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    border: 1px solid rgba(200,150,42,0.1);
    transition: all 0.3s;
  }

  .feature-item:hover {
    background: rgba(200,150,42,0.05);
    border-color: rgba(200,150,42,0.3);
    transform: translateX(8px);
  }

  .feature-num {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: rgba(200,150,42,0.3);
    line-height: 1;
    min-width: 40px;
  }

  .feature-content h4 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--gold-light);
  }

  .feature-content p {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
  }

  .why-visual {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-showcase {
    width: 320px; height: 320px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(200,150,42,0.1), rgba(13,43,107,0.5));
    border: 2px solid rgba(200,150,42,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 60px rgba(200,150,42,0.15), inset 0 0 60px rgba(7,26,69,0.5);
    animation: pulseGlow 3s ease-in-out infinite;
  }

  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 0 40px rgba(200,150,42,0.15), inset 0 0 40px rgba(7,26,69,0.5); }
    50% { box-shadow: 0 0 80px rgba(200,150,42,0.3), inset 0 0 60px rgba(7,26,69,0.5); }
  }

  .logo-showcase img {
    width: 85%;
    height: 85%;
    object-fit: contain;
  }

  /* ============ PROCESS SECTION ============ */
  .process {
    background: var(--navy-dark);
    overflow: hidden;
  }

  .process-header { text-align: center; margin-bottom: 60px; }

  .process-steps {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    position: relative;
    max-width: 1200px;
    margin: 0 auto;
  }

  .process-steps::before {
    content: '';
    position: absolute;
